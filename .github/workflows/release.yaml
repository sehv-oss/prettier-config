name: Release

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: sehv-oss/actions/.github/workflows/release-node-pnpm.yaml@main
    secrets: inherit
    with:
      cspell: false
      prettier: false
      eslint: false
      skip-test: true
